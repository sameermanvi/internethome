name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build with Anna
        run: go run github.com/anna-ssg/anna/v3@v3.0.0

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Create .nojekyll
        run: touch site/rendered/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/rendered

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
